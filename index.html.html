<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디딤길 - 서울 도로형 휠체어 시뮬레이터</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #dff3ff;
    }
    #app { position: relative; width: 100%; height: 100%; }
    canvas { display: block; }
    #overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(180deg, rgba(235,248,255,0.96), rgba(214,236,247,0.96));
      z-index: 10; transition: opacity 0.35s ease, visibility 0.35s ease;
    }
    #overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .panel {
      width: min(560px, calc(100% - 32px)); background: rgba(255,255,255,0.88);
      border: 1px solid rgba(120,160,180,0.25); box-shadow: 0 18px 50px rgba(40, 90, 110, 0.15);
      border-radius: 24px; padding: 32px 28px; text-align: center; backdrop-filter: blur(8px);
    }
    .brand { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.04em; color: #16506d; margin: 0 0 10px; }
    .desc { margin: 0 0 22px; color: #35586b; line-height: 1.7; font-size: 1rem; }
    .start-btn {
      appearance: none; border: none; border-radius: 999px; background: linear-gradient(135deg, #2aa4d8, #1778a6);
      color: white; font-size: 1.05rem; font-weight: 700; padding: 14px 24px; cursor: pointer;
      box-shadow: 0 12px 24px rgba(23, 120, 166, 0.28); transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    #fallback {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      background: #f4fbff; color: #295165; font-size: 1.2rem; z-index: 20; text-align: center; padding: 24px;
    }
    #fallback.show { display: flex; }
    #hint, #controls-ui {
      position: absolute; z-index: 6; background: rgba(255,255,255,0.78); border: 1px solid rgba(120,160,180,0.22);
      color: #2e5668; border-radius: 12px; padding: 10px 12px; box-shadow: 0 10px 24px rgba(40, 90, 110, 0.09);
      user-select: none;
    }
    #hint { left: 16px; bottom: 16px; font-size: 0.92rem; }
    #controls-ui { left: 50%; bottom: 14px; transform: translateX(-50%); font-size: 0.92rem; text-align: center; line-height: 1.5; }
    #controls-ui kbd {
      display: inline-block; min-width: 20px; padding: 2px 6px; margin: 0 2px; border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.12); background: #f4f7fa; box-shadow: inset 0 -1px 0 rgba(0,0,0,0.05);
      font-weight: 700; font-size: 0.88rem;
    }
    #pointerArea { position: absolute; inset: 0; z-index: 4; }
  </style>
</head>
<body>
  <div id="app">
    <div id="pointerArea"></div>
    <div id="overlay">
      <div class="panel">
        <h1 class="brand">디딤길</h1>
        <p class="desc">서울의 일반적인 도로 형태를 사실적으로 표현하고<br />땅 가까이에서 보는 1인칭 이동을 지원합니다.</p>
        <button id="startBtn" class="start-btn">체험 시작</button>
      </div>
    </div>

    <div id="fallback">WebGL을 초기화할 수 없습니다. 브라우저 또는 그래픽 설정을 확인해 주세요.</div>
    <div id="hint">벽돌 인도 / 콘크리트 차도 / 난간 / 매끄러운 언덕 / 가계</div>
    <div id="controls-ui">
      <div><kbd>W</kbd> / <kbd>↑</kbd> 전진 · <kbd>S</kbd> / <kbd>↓</kbd> 후진</div>
      <div><kbd>A</kbd> / <kbd>←</kbd> 왼쪽 · <kbd>D</kbd> / <kbd>→</kbd> 오른쪽</div>
      <div>2배 강화 감도</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    const app = document.getElementById('app');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const fallback = document.getElementById('fallback');

    let scene, camera, renderer, clock;
    const world = new THREE.Group();
    const colliders = [];
    const keysPressed = new Set();

    const layout = {
      groundY: -1.4,
      sidewalk: { width: 6.6, height: 0.18, length: 72, x: -5.9, z: 0 },
      road: { width: 7.5, height: 0.16, length: 72, x: 3.85, z: 0 },
      entrance: { width: 2.2, length: 4, height: 0.12, x: -5.9, z: -31 },
      hill1: { x: -17, z: 10, width: 10, length: 8, height: 10 },
      hill2: { x: -17, z: 20, width: 10, length: 8, height: 2 }
    };

    const movement = { speed: 5.2, minX: -8.8, maxX: 10.8, minZ: -33, maxZ: 33, radius: 0.35 };
    const player = { position: new THREE.Vector3(-4.2, 0, -29), eyeHeight: 0.18 };
    const look = {
      yaw: 0,
      pitch: 0,
      maxYaw: Math.PI / 2,
      maxPitch: THREE.MathUtils.degToRad(19)
    };

    const pointer = { x: 0.5, y: 0.5 };

    function makeBox(w, h, d, material) { return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material); }
    function addColliderFromBox(center, halfSize) { colliders.push({ center: center.clone(), halfSize: halfSize.clone() }); }

    function isPlayerColliding(pos) {
      const r = movement.radius;
      for (const c of colliders) {
        if (Math.abs(pos.x - c.center.x) < c.halfSize.x + r && Math.abs(pos.z - c.center.z) < c.halfSize.z + r) return true;
      }
      return false;
    }

    function tryMove(dx, dz) {
      const nextX = player.position.clone();
      nextX.x = THREE.MathUtils.clamp(nextX.x + dx, movement.minX, movement.maxX);
      if (!isPlayerColliding(nextX)) player.position.x = nextX.x;

      const nextZ = player.position.clone();
      nextZ.z = THREE.MathUtils.clamp(nextZ.z + dz, movement.minZ, movement.maxZ);
      if (!isPlayerColliding(nextZ)) player.position.z = nextZ.z;
    }

    function makeCanvasTexture(drawFn, size = 512) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      drawFn(ctx, size);
      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    const createBrickTexture = () => makeCanvasTexture((ctx, size) => {
      ctx.fillStyle = '#d8c9b9'; ctx.fillRect(0, 0, size, size);
      const brickW = 64, brickH = 32;
      for (let y = 0; y < size; y += brickH) for (let x = 0; x < size; x += brickW) {
        const offsetX = ((y / brickH) % 2) * (brickW / 2), bx = x + offsetX;
        ctx.fillStyle = `hsl(${28 + Math.random() * 6}, 28%, ${72 + Math.random() * 8}%)`;
        ctx.fillRect(bx, y, brickW - 2, brickH - 2);
        ctx.strokeStyle = 'rgba(120, 90, 70, 0.18)';
        ctx.strokeRect(bx + 0.5, y + 0.5, brickW - 3, brickH - 3);
      }
    }, 1024);

    const createConcreteTexture = () => makeCanvasTexture((ctx, size) => {
      ctx.fillStyle = '#7e8792'; ctx.fillRect(0, 0, size, size);
      const image = ctx.getImageData(0, 0, size, size), data = image.data;
      for (let i = 0; i < data.length; i += 4) {
        const n = (Math.random() - 0.5) * 22; data[i] += n; data[i + 1] += n; data[i + 2] += n;
      }
      ctx.putImageData(image, 0, 0);
    }, 1024);

    const createSmoothTexture = (a, b) => makeCanvasTexture((ctx, size) => {
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, a); grad.addColorStop(1, b);
      ctx.fillStyle = grad; ctx.fillRect(0, 0, size, size);
    }, 512);

    function createSkyAndGround() {
      scene.background = new THREE.Color(0xdff3ff);
      scene.fog = new THREE.Fog(0xdff3ff, 30, 120);
      const ground = makeBox(220, 0.5, 220, new THREE.MeshStandardMaterial({ color: 0xbfdca8, roughness: 1 }));
      ground.position.set(0, layout.groundY - 0.25, 0);
      world.add(ground);
      world.add(new THREE.Mesh(new THREE.SphereGeometry(150, 32, 24), new THREE.MeshBasicMaterial({ color: 0xdff3ff, side: THREE.BackSide })));
    }

    function createStreet() {
      const brickTex = createBrickTexture(); brickTex.repeat.set(6, 20);
      const concreteTex = createConcreteTexture(); concreteTex.repeat.set(8, 18);
      const sidewalkMat = new THREE.MeshStandardMaterial({ map: brickTex, roughness: 1 });
      const roadMat = new THREE.MeshStandardMaterial({ map: concreteTex, roughness: 1, color: 0xffffff });
      const streetGroup = new THREE.Group();

      const sidewalk = makeBox(layout.sidewalk.width, layout.sidewalk.height, layout.sidewalk.length, sidewalkMat);
      sidewalk.position.set(layout.sidewalk.x, layout.groundY + layout.sidewalk.height / 2, layout.sidewalk.z);
      streetGroup.add(sidewalk);

      const road = makeBox(layout.road.width, layout.road.height, layout.road.length, roadMat);
      road.position.set(layout.road.x, layout.groundY + layout.road.height / 2, layout.road.z);
      streetGroup.add(road);

      const curb = makeBox(0.18, 0.22, layout.sidewalk.length, new THREE.MeshStandardMaterial({ color: 0xb9b4ab, roughness: 1 }));
      curb.position.set(-0.05, layout.groundY + 0.11, 0);
      streetGroup.add(curb);

      world.add(streetGroup);
    }

    function createEntrance() {
      const entranceGroup = new THREE.Group();
      const rampMat = new THREE.MeshStandardMaterial({ color: 0xe3ddd1, roughness: 0.95 });
      const ramp = makeBox(layout.entrance.width, layout.entrance.height, layout.entrance.length, rampMat);
      ramp.position.set(layout.entrance.x, layout.groundY + layout.entrance.height / 2, layout.entrance.z);
      ramp.rotation.z = -0.12;
      entranceGroup.add(ramp);
      world.add(entranceGroup);
    }

    function createConnectedHill(baseX, baseZ, width, length, height, color, tilt) {
      const hillMat = new THREE.MeshStandardMaterial({ map: createSmoothTexture(color, color), roughness: 0.85 });
      const group = new THREE.Group();
      const lowestY = layout.groundY + 0.02;
      const highestY = lowestY + height;
      const hill = makeBox(width, height, length, hillMat);
      hill.position.set(baseX, lowestY + height / 2, baseZ);
      hill.rotation.z = tilt;
      group.add(hill);
      const foot = makeBox(width * 0.95, 0.08, length * 0.95, hillMat);
      foot.position.set(baseX, lowestY + 0.04, baseZ);
      foot.rotation.z = tilt;
      group.add(foot);
      const cap = makeBox(width * 0.92, 0.1, length * 0.92, hillMat);
      cap.position.set(baseX, highestY - 0.05, baseZ);
      cap.rotation.z = tilt;
      group.add(cap);
      return group;
    }

    function createRailAlongHill(x, z, height, length) {
      const railGroup = new THREE.Group();
      const railMat = new THREE.MeshStandardMaterial({ color: 0x6f7780, roughness: 0.6 });
      const thickness = 0.08;
      for (let side of [-1, 1]) {
        for (let i = 0; i < 6; i++) {
          const t = i / 5;
          const post = makeBox(thickness, 1.2, thickness, railMat);
          post.position.set(x + side * 5.2, layout.groundY + 0.6, z - length / 2 + t * length);
          railGroup.add(post);
          addColliderFromBox(post.position, new THREE.Vector3(thickness / 2, 0.6, thickness / 2));
        }
        const bar = makeBox(thickness, thickness, length + 0.2, railMat);
        bar.position.set(x + side * 5.2, layout.groundY + 1.15, z);
        railGroup.add(bar);
        addColliderFromBox(bar.position, new THREE.Vector3(thickness / 2, thickness / 2, (length + 0.2) / 2));
      }
      return railGroup;
    }

    function createHills() {
      world.add(createConnectedHill(layout.hill1.x, layout.hill1.z, layout.hill1.width, layout.hill1.length, layout.hill1.height, '#77c87b', -0.4));
      world.add(createConnectedHill(layout.hill2.x, layout.hill2.z, layout.hill2.width, layout.hill2.length, layout.hill2.height, '#58ad67', 0.2));
      world.add(createRailAlongHill(layout.hill1.x, layout.hill1.z, layout.hill1.height, layout.hill1.length));
      world.add(createRailAlongHill(layout.hill2.x, layout.hill2.z, layout.hill2.height, layout.hill2.length));
    }

    function createShop(type, x, z, scale = 1) {
      const g = new THREE.Group();
      const bodyColors = { cafe: 0xf7efe0, pharmacy: 0xe8f1ff, mart: 0xf3f0ff, bakery: 0xffefe8 };
      const roofs = { cafe: 0xc66b4a, pharmacy: 0x5679b5, mart: 0x7d6cc6, bakery: 0xe39a5f };
      const body = makeBox(2.8 * scale, 2.2 * scale, 2.2 * scale, new THREE.MeshStandardMaterial({ color: bodyColors[type] || 0xffffff, roughness: 0.95 }));
      body.position.y = layout.groundY + 1.1 * scale;
      g.add(body);
      const roof = makeBox(3.0 * scale, 0.3 * scale, 2.4 * scale, new THREE.MeshStandardMaterial({ color: roofs[type] || 0x999999, roughness: 0.9 }));
      roof.position.y = layout.groundY + 2.35 * scale;
      g.add(roof);
      const sign = makeBox(2.0 * scale, 0.8 * scale, 0.08, new THREE.MeshStandardMaterial({ color: 0xffd66b, roughness: 0.9 }));
      sign.position.set(-0.7 * scale, layout.groundY + 1.65 * scale, -1.25 * scale);
      sign.rotation.y = Math.PI;
      g.add(sign);
      g.position.set(x, 0, z);
      return g;
    }

    function createShops() {
      const shops = new THREE.Group();
      [['cafe', -11.0, -8], ['pharmacy', -11.0, -2.8], ['mart', -11.0, 4.8], ['bakery', -11.0, 11.9]].forEach(([type, x, z]) => shops.add(createShop(type, x, z, 0.95)));
      world.add(shops);
    }

    function updateCameraFromPointer() {
      const rect = renderer.domElement.getBoundingClientRect();
      const px = THREE.MathUtils.clamp(pointer.x / rect.width, 0, 1);
      const py = THREE.MathUtils.clamp(pointer.y / rect.height, 0, 1);

      const yawRange = Math.PI * 1.84;
      const pitchRange = THREE.MathUtils.degToRad(68);

      look.yaw = (px - 0.5) * yawRange;
      look.pitch = (0.5 - py) * pitchRange;

      look.yaw = THREE.MathUtils.clamp(look.yaw, -look.maxYaw, look.maxYaw);
      look.pitch = THREE.MathUtils.clamp(look.pitch, -look.maxPitch, look.maxPitch);

      const dir = new THREE.Vector3(
        Math.sin(look.yaw) * Math.cos(look.pitch),
        Math.sin(look.pitch),
        -Math.cos(look.yaw) * Math.cos(look.pitch)
      );

      camera.position.set(player.position.x, player.eyeHeight, player.position.z);
      camera.lookAt(camera.position.clone().add(dir));
    }

    function isTypingTarget(target) {
      if (!target) return false;
      const tag = target.tagName ? target.tagName.toLowerCase() : '';
      return tag === 'input' || tag === 'textarea' || tag === 'select' || target.isContentEditable;
    }

    function handleKeyDown(e) {
      if (!overlay.classList.contains('hidden')) return;
      if (isTypingTarget(document.activeElement)) return;
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault();
      keysPressed.add(e.code);
    }

    function handleKeyUp(e) { keysPressed.delete(e.code); }

    function updateMovement(deltaTime) {
      if (!overlay.classList.contains('hidden')) return;

      const forward = (keysPressed.has('KeyW') || keysPressed.has('ArrowUp')) ? 1 : 0;
      const backward = (keysPressed.has('KeyS') || keysPressed.has('ArrowDown')) ? 1 : 0;
      const left = (keysPressed.has('KeyA') || keysPressed.has('ArrowLeft')) ? 1 : 0;
      const right = (keysPressed.has('KeyD') || keysPressed.has('ArrowRight')) ? 1 : 0;

      const moveForward = forward - backward;
      const moveSide = right - left;

      const yaw = look.yaw;
      const forwardVec = new THREE.Vector3(Math.sin(yaw), 0, -Math.cos(yaw));
      const rightVec = new THREE.Vector3(Math.cos(yaw), 0, Math.sin(yaw));

      const dx = (forwardVec.x * moveForward + rightVec.x * moveSide) * movement.speed * deltaTime;
      const dz = (forwardVec.z * moveForward + rightVec.z * moveSide) * movement.speed * deltaTime;

      tryMove(dx, dz);
    }

    function initPointerControl() {
      window.addEventListener('pointermove', (e) => {
        if (!overlay.classList.contains('hidden')) return;
        if (e.target && e.target.closest && e.target.closest('.panel')) return;
        if (!renderer) return;
        const rect = renderer.domElement.getBoundingClientRect();
        if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) return;
        pointer.x = e.clientX - rect.left;
        pointer.y = e.clientY - rect.top;
      }, { passive: true });
    }

    function init() {
      try {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        app.insertBefore(renderer.domElement, overlay);

        scene.add(new THREE.AmbientLight(0xffffff, 1.45));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.25);
        directionalLight.position.set(10, 18, 12);
        scene.add(directionalLight);

        createSkyAndGround();
        createStreet();
        createEntrance();
        createHills();
        createShops();
        scene.add(world);

        window.addEventListener('resize', onResize);
        window.addEventListener('keydown', handleKeyDown, { passive: false });
        window.addEventListener('keyup', handleKeyUp);
        initPointerControl();

        clock = new THREE.Clock();
        animate();
      } catch (error) {
        fallback.classList.add('show');
        console.error(error);
      }
    }

    function onResize() {
      if (!camera || !renderer) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    }

    function animate() {
      requestAnimationFrame(animate);
      const deltaTime = clock.getDelta();
      updateMovement(deltaTime);
      if (overlay.classList.contains('hidden')) updateCameraFromPointer();
      renderer.render(scene, camera);
    }

    startBtn.addEventListener('click', () => overlay.classList.add('hidden'));
    init();
  </script>
</body>
</html>
